name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vendor letter-pro
        run: bash scripts/vendor-letter-pro.sh

      - name: Verify vendored letter-pro
        run: npm run verify:vendored

      - name: Lint
        run: npm run lint

      - name: Typecheck and build
        run: npm run build

      - name: Scaffold tests
        run: npm run test:scaffold
